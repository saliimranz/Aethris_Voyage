    <script type="text/babel">
      (() => {
      const { useEffect, useRef } = React;

      function FadingVideo({ src, className = "", style = {} }) {
        const videoRef = useRef(null);
        const rafRef = useRef(null);
        const fadingOutRef = useRef(false);
        const restartTimerRef = useRef(null);
        const FADE_MS = 500;
        const FADE_OUT_LEAD = 0.55;

        useEffect(() => {
          const video = videoRef.current;
          if (!video) return undefined;

          const fadeTo = (target, duration) => {
            cancelAnimationFrame(rafRef.current);
            const rawOpacity = video.style.opacity;
            const startOpacity = rawOpacity === "" ? 0 : Number.parseFloat(rawOpacity);
            const from = Number.isFinite(startOpacity) ? startOpacity : 0;
            const startedAt = performance.now();

            const step = (now) => {
              const elapsed = now - startedAt;
              const progress = Math.min(elapsed / duration, 1);
              const eased = 1 - Math.pow(1 - progress, 3);
              const next = from + (target - from) * eased;
              video.style.opacity = String(next);

              if (progress < 1) {
                rafRef.current = requestAnimationFrame(step);
              } else {
                video.style.opacity = String(target);
              }
            };

            rafRef.current = requestAnimationFrame(step);
          };

          const handleLoadedData = () => {
            video.style.opacity = "0";
            const playPromise = video.play();
            if (playPromise && typeof playPromise.catch === "function") {
              playPromise.catch(() => {});
            }
            fadeTo(1, FADE_MS);
          };

          const handleTimeUpdate = () => {
            if (
              !fadingOutRef.current &&
              video.duration &&
              video.duration - video.currentTime <= FADE_OUT_LEAD &&
              video.duration - video.currentTime > 0
            ) {
              fadingOutRef.current = true;
              fadeTo(0, FADE_MS);
            }
          };

          const handleEnded = () => {
            video.style.opacity = "0";
            restartTimerRef.current = setTimeout(() => {
              video.currentTime = 0;
              const playPromise = video.play();
              if (playPromise && typeof playPromise.catch === "function") {
                playPromise.catch(() => {});
              }
              fadingOutRef.current = false;
              fadeTo(1, FADE_MS);
            }, 100);
          };

          video.addEventListener("loadeddata", handleLoadedData);
          video.addEventListener("timeupdate", handleTimeUpdate);
          video.addEventListener("ended", handleEnded);

          if (video.readyState >= 2) {
            handleLoadedData();
          }

          return () => {
            cancelAnimationFrame(rafRef.current);
            clearTimeout(restartTimerRef.current);
            video.removeEventListener("loadeddata", handleLoadedData);
            video.removeEventListener("timeupdate", handleTimeUpdate);
            video.removeEventListener("ended", handleEnded);
          };
        }, [src]);

        return (
          <video
            ref={videoRef}
            src={src}
            className={className}
            style={{ ...style, opacity: 0 }}
            autoPlay
            muted
            playsInline
            preload="auto"
          />
        );
      }

      window.FadingVideo = FadingVideo;
      })();
    </script>

    <script type="text/babel">
      (() => {
      const { motion } = window.Motion;

      const { useEffect, useRef, useState } = React;

      function BlurText({ text, className = "" }) {
        const ref = useRef(null);
        const [visible, setVisible] = useState(false);
        const words = text.split(" ");

        useEffect(() => {
          const element = ref.current;
          if (!element) return undefined;

          const observer = new IntersectionObserver(
            ([entry]) => {
              if (entry.isIntersecting) {
                setVisible(true);
                observer.disconnect();
              }
            },
            { threshold: 0.1 }
          );

          observer.observe(element);

          return () => observer.disconnect();
        }, []);

        return (
          <p
            ref={ref}
            className={`${className} flex flex-wrap row-gap-tight`}
            style={{ display: "flex", flexWrap: "wrap", justifyContent: "center", rowGap: "0.1em" }}
          >
            {words.map((word, index) => (
              <motion.span
                key={`${word}-${index}`}
                initial={{ filter: "blur(10px)", opacity: 0, y: 50 }}
                animate={
                  visible
                    ? {
                        filter: ["blur(10px)", "blur(5px)", "blur(0px)"],
                        opacity: [0, 0.5, 1],
                        y: [50, -5, 0],
                      }
                    : {}
                }
                transition={{
                  duration: 0.7,
                  times: [0, 0.5, 1],
                  ease: "easeOut",
                  delay: (index * 100) / 1000,
                }}
                style={{ display: "inline-block", marginRight: "0.28em" }}
              >
                {word}
              </motion.span>
            ))}
          </p>
        );
      }

      window.BlurText = BlurText;
      })();
    </script>

      function Capabilities() {

    <script type="text/babel">
      (() => {
      const { useEffect, useRef, useState } = React;
      const SECTION_IDS = ["hero", "voyages", "worlds", "innovation", "plan-launch"];
      const TRANSITION_LOCK_MS = 560;
      const WHEEL_THRESHOLD = 28;
      const TOUCH_THRESHOLD = 52;

      const getInitialSectionIndex = () => {
        const hash = window.location.hash.replace("#", "");
        const hashIndex = SECTION_IDS.indexOf(hash);
        return hashIndex >= 0 ? hashIndex : 0;
      };

      function App() {
        const [activeIndex, setActiveIndex] = useState(getInitialSectionIndex);
        const deckRef = useRef(null);
        const activeIndexRef = useRef(activeIndex);
        const lockRef = useRef(false);
        const lockTimerRef = useRef(null);
        const touchStartRef = useRef(null);

        useEffect(() => {
          activeIndexRef.current = activeIndex;
          const section = deckRef.current?.children?.[activeIndex];
          if (section) {
            section.scrollTop = 0;
          }

          Array.from(deckRef.current?.children || []).forEach((panel, index) => {
            panel.setAttribute("aria-hidden", index === activeIndex ? "false" : "true");
          });
        }, [activeIndex]);

        useEffect(() => {
          const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

          const releaseLock = () => {
            clearTimeout(lockTimerRef.current);
            lockTimerRef.current = setTimeout(() => {
              lockRef.current = false;
            }, prefersReducedMotion ? 160 : TRANSITION_LOCK_MS);
          };

          const updateHash = (index, mode = "replace") => {
            const nextHash = `#${SECTION_IDS[index]}`;
            if (window.location.hash === nextHash) return;
            const method = mode === "push" ? "pushState" : "replaceState";
            window.history[method](null, "", nextHash);
          };

          const moveTo = (nextIndex, mode = "replace") => {
            const bounded = Math.max(0, Math.min(SECTION_IDS.length - 1, nextIndex));
            if (bounded === activeIndexRef.current || lockRef.current) return;

            lockRef.current = true;
            activeIndexRef.current = bounded;
            setActiveIndex(bounded);
            updateHash(bounded, mode);
            releaseLock();
          };

          const activePanel = () => deckRef.current?.children?.[activeIndexRef.current];

          const canLeavePanel = (direction) => {
            const panel = activePanel();
            if (!panel) return true;

            const maxScroll = panel.scrollHeight - panel.clientHeight;
            if (maxScroll <= 2) return true;

            if (direction > 0) {
              return panel.scrollTop >= maxScroll - 4;
            }

            return panel.scrollTop <= 4;
          };

          const handleWheel = (event) => {
            if (Math.abs(event.deltaY) < WHEEL_THRESHOLD) return;

            const direction = event.deltaY > 0 ? 1 : -1;

            if (!canLeavePanel(direction)) {
              return;
            }

            event.preventDefault();

            if (lockRef.current) return;
            moveTo(activeIndexRef.current + direction);
          };

          const handleKeyDown = (event) => {
            const tagName = event.target?.tagName?.toLowerCase();
            if (["input", "textarea", "select"].includes(tagName) || event.target?.isContentEditable) {
              return;
            }

            const nextKeys = ["ArrowDown", "PageDown", " "];
            const previousKeys = ["ArrowUp", "PageUp"];

            if (nextKeys.includes(event.key)) {
              if (!canLeavePanel(1)) return;
              event.preventDefault();
              moveTo(activeIndexRef.current + 1);
            } else if (previousKeys.includes(event.key)) {
              if (!canLeavePanel(-1)) return;
              event.preventDefault();
              moveTo(activeIndexRef.current - 1);
            } else if (event.key === "Home") {
              event.preventDefault();
              moveTo(0);
            } else if (event.key === "End") {
              event.preventDefault();
              moveTo(SECTION_IDS.length - 1);
            }
          };

          const handleTouchStart = (event) => {
            const touch = event.touches[0];
            const panel = activePanel();
            const maxScroll = panel ? panel.scrollHeight - panel.clientHeight : 0;

            touchStartRef.current = {
              x: touch.clientX,
              y: touch.clientY,
              canLeaveDown: !panel || maxScroll <= 2 || panel.scrollTop >= maxScroll - 4,
              canLeaveUp: !panel || maxScroll <= 2 || panel.scrollTop <= 4,
            };
          };

          const handleTouchEnd = (event) => {
            if (!touchStartRef.current) return;

            const startedAt = touchStartRef.current;
            const touch = event.changedTouches[0];
            const deltaX = touch.clientX - startedAt.x;
            const deltaY = touch.clientY - startedAt.y;
            touchStartRef.current = null;

            if (Math.abs(deltaY) < TOUCH_THRESHOLD || Math.abs(deltaY) < Math.abs(deltaX)) {
              return;
            }

            const direction = deltaY < 0 ? 1 : -1;
            const canLeaveFromStart = direction > 0 ? startedAt.canLeaveDown : startedAt.canLeaveUp;
            if (!canLeaveFromStart || lockRef.current) return;

            moveTo(activeIndexRef.current + direction);
          };

          const handleDocumentClick = (event) => {
            const link = event.target.closest?.('a[href^="#"]');
            if (!link) return;

            const targetId = link.getAttribute("href").slice(1);
            const targetIndex = SECTION_IDS.indexOf(targetId);
            if (targetIndex < 0) return;

            event.preventDefault();
            moveTo(targetIndex, "push");
          };

          const handleHashChange = () => {
            const targetIndex = SECTION_IDS.indexOf(window.location.hash.replace("#", ""));
            if (targetIndex >= 0) {
              moveTo(targetIndex, "replace");
            }
          };

          window.addEventListener("wheel", handleWheel, { passive: false });
          window.addEventListener("keydown", handleKeyDown);
          window.addEventListener("touchstart", handleTouchStart, { passive: true });
          window.addEventListener("touchend", handleTouchEnd, { passive: true });
          window.addEventListener("hashchange", handleHashChange);
          document.addEventListener("click", handleDocumentClick);

          return () => {
            clearTimeout(lockTimerRef.current);
            window.removeEventListener("wheel", handleWheel);
            window.removeEventListener("keydown", handleKeyDown);
            window.removeEventListener("touchstart", handleTouchStart);
            window.removeEventListener("touchend", handleTouchEnd);
            window.removeEventListener("hashchange", handleHashChange);
            document.removeEventListener("click", handleDocumentClick);
          };
        }, []);

        return (
          <div className="h-full bg-black text-white">
            <Navbar activeSection={SECTION_IDS[activeIndex]} />
            <div ref={deckRef} className="section-deck" data-active={activeIndex}>
              <Hero />
              <Voyages />
              <Worlds />
              <Capabilities />
              <PlanLaunch />
            </div>
          </div>
        );
      }

      window.App = App;

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
      })();
    </script>
